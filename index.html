<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📐 Premium 3D Shadow Box Maker</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- JSZip Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <style>
        :root {
            --primary: #00f0ff;
            --primary-glow: rgba(0, 240, 255, 0.3);
            --primary-dark: #0088cc;
            --bg-radial: radial-gradient(circle at 50% 50%, #171721, #0a0a0f);
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.06);
            --text-main: #f3f3f7;
            --text-muted: #88889c;
        }

        * {
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-radial);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* App Top Header Bar */
        .app-header {
            height: 60px;
            background: rgba(10, 10, 15, 0.8);
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            backdrop-filter: blur(10px);
            z-index: 101;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #ffffff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title i {
            color: var(--primary);
            -webkit-text-fill-color: initial;
        }

        .badge {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: var(--primary);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--primary);
        }

        /* Loading Screen overlay */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0a0a0f;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.05);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        /* App Body Layout */
        .app-body {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            width: 380px;
            height: 100%;
            overflow-y: auto;
            background: rgba(12, 12, 16, 0.95);
            border-right: 1px solid var(--card-border);
            padding: 20px;
            padding-bottom: 100px; /* Space for floating buttons */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .main-content {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* Premium CSS Accordions */
        details {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        details[open] {
            border-color: rgba(0, 240, 255, 0.2);
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        summary {
            padding: 14px 18px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
            list-style: none;
            user-select: none;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary::after {
            content: '\f107';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            transition: transform 0.3s ease;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        details[open] summary::after {
            transform: rotate(180deg);
            color: var(--primary);
        }

        .details-content {
            padding: 18px;
            border-top: 1px solid var(--card-border);
            background: rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Inputs & Forms */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="number"] {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text-main);
            padding: 10px 14px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
            width: 100%;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.15);
        }

        /* Sliders */
        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .slider-wrapper input[type="range"] {
            flex: 1;
            accent-color: var(--primary);
            height: 5px;
            border-radius: 5px;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
        }

        .slider-val {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
            width: 50px;
            text-align: right;
        }

        /* Custom File Upload Button */
        .file-upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(0, 240, 255, 0.04);
            border: 1px dashed rgba(0, 240, 255, 0.3);
            border-radius: 10px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .file-upload-btn:hover {
            background: rgba(0, 240, 255, 0.08);
            border-color: var(--primary);
        }

        .file-upload-btn i {
            font-size: 1.3rem;
            color: var(--primary);
        }

        .file-upload-btn span {
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Checkboxes & Radios */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            font-size: 0.85rem;
        }

        .checkbox-group input[type="checkbox"] {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            margin: 4px 0;
            font-size: 0.85rem;
            user-select: none;
        }

        .radio-option input[type="radio"] {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Floating / Fixed Action Bar */
        .action-bar-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 380px;
            background: rgba(10, 10, 14, 0.95);
            border-top: 1px solid var(--card-border);
            padding: 15px 20px;
            display: flex;
            gap: 12px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .btn {
            flex: 1;
            background: linear-gradient(135deg, #00f0ff, #0072ff);
            color: #050508;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.15);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 240, 255, 0.35);
        }

        .btn.btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-main);
            border: 1px solid var(--card-border);
            box-shadow: none;
        }

        .btn.btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        /* Preview Area */
        .previews-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .preview-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
        }

        .preview-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
            align-self: flex-start;
        }

        .preview-title i {
            color: var(--primary);
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f14;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Mobile Responsive Viewport Overrides */
        @media (max-width: 900px) {
            body {
                height: auto;
                overflow-y: auto;
            }

            .app-body {
                flex-direction: column;
                height: auto;
                overflow: visible;
            }

            /* Previews stack at the top */
            .main-content {
                width: 100%;
                height: auto;
                order: 1;
                padding: 15px;
                gap: 15px;
                overflow: visible;
            }

            .previews-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .preview-box {
                padding: 15px;
                border-radius: 12px;
            }

            /* Controls stack at the bottom */
            .sidebar {
                width: 100%;
                height: auto;
                order: 2;
                border-right: none;
                border-top: 1px solid var(--card-border);
                padding: 15px;
                padding-bottom: 90px; /* Leave space for sticky bottom bar */
                overflow: visible;
            }

            /* Sticky bottom action buttons for mobile */
            .action-bar-fixed {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                border-top: 1px solid var(--card-border);
                background: rgba(10, 10, 15, 0.98);
                box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.6);
                padding: 12px 15px;
                backdrop-filter: blur(15px);
            }
        }
    </style>
</head>
<body>

    <!-- App Top Bar -->
    <div class="app-header">
        <div class="header-title"><i class="fa-solid fa-cube"></i> Shadow Box Maker</div>
        <div class="badge">
            <div class="badge-dot"></div>
            <span>OpenCV Ready</span>
        </div>
    </div>

    <!-- Loading Screen overlay -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">LOADING OPENCV.JS CORE ENGINE...</div>
        <div style="font-size:0.8rem; color:var(--text-muted); margin-top:10px;">Please wait while the computer graphics library initializes.</div>
    </div>

    <div class="app-body">
        <!-- Sidebar controls -->
        <div class="sidebar">

            <!-- Tab 1: Input & Adjustment -->
            <details open>
                <summary><i class="fa-solid fa-image" style="color:var(--primary); margin-right:8px;"></i> 1. Silhouette & Fit</summary>
                <div class="details-content">
                    <div class="input-group">
                        <label class="file-upload-btn" for="imageFileInput">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                            <span id="upload-label">Browse Silhouette Image</span>
                        </label>
                        <input type="file" id="imageFileInput" accept="image/*" style="display: none;">
                    </div>

                    <div class="input-group">
                        <label>Scale (%)</label>
                        <div class="slider-wrapper">
                            <input type="range" id="img_scale" min="10" max="500" value="150">
                            <span class="slider-val" id="val_img_scale">150%</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Shift X (mm)</label>
                        <div class="slider-wrapper">
                            <input type="range" id="offset_x" min="-500" max="500" value="0">
                            <span class="slider-val" id="val_offset_x">0</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Shift Y (mm)</label>
                        <div class="slider-wrapper">
                            <input type="range" id="offset_y" min="-500" max="500" value="100">
                            <span class="slider-val" id="val_offset_y">100</span>
                        </div>
                    </div>

                    <button class="btn btn-secondary" id="btn-autofit" style="font-size: 0.8rem; padding: 10px;"><i class="fa-solid fa-wand-magic-sparkles"></i> Auto-Fit Silhouette</button>
                </div>
            </details>

            <!-- Tab 2: Box Dimensions -->
            <details>
                <summary><i class="fa-solid fa-ruler-combined" style="color:var(--primary); margin-right:8px;"></i> 2. Box Dimensions (mm)</summary>
                <div class="details-content">
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Width (X)</label>
                            <input type="number" id="box_w" value="413.6" step="0.1">
                        </div>
                        <div class="input-group">
                            <label>Height (Y)</label>
                            <input type="number" id="box_h" value="435.5" step="0.1">
                        </div>
                        <div class="input-group full-width">
                            <label>Depth (Z)</label>
                            <input type="number" id="box_d" value="200.0" step="0.1">
                        </div>
                    </div>
                </div>
            </details>

            <!-- Tab 3: Optical Settings -->
            <details>
                <summary><i class="fa-solid fa-lightbulb" style="color:var(--primary); margin-right:8px;"></i> 3. Optical Settings (mm)</summary>
                <div class="details-content">
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Light Source Z</label>
                            <input type="number" id="light_z" value="280.0" step="0.1">
                        </div>
                        <div class="input-group">
                            <label>Front Opening Z</label>
                            <input type="number" id="front_z" value="80.0" step="0.1">
                        </div>
                        <div class="input-group">
                            <label>Target Width</label>
                            <input type="number" id="target_w" value="1500.0" step="0.1">
                        </div>
                        <div class="input-group">
                            <label>Target Height</label>
                            <input type="number" id="target_h" value="1600.0" step="0.1">
                        </div>
                    </div>
                </div>
            </details>

            <!-- Tab 4: Preprocessing & Advanced -->
            <details>
                <summary><i class="fa-solid fa-gears" style="color:var(--primary); margin-right:8px;"></i> 4. Preprocessing & Design</summary>
                <div class="details-content">
                    <div class="input-group">
                        <label>Resolution (pixels/mm)</label>
                        <input type="number" id="res_val" value="2.0" step="0.1">
                    </div>

                    <div class="input-group">
                        <label>Panel Type</label>
                        <label class="radio-option">
                            <input type="radio" name="panel_type" value="255" checked>
                            <span>Cutout (White bg / Solid cuts)</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="panel_type" value="0">
                            <span>Solid (Black bg / Cutout holes)</span>
                        </label>
                    </div>

                    <div class="input-group" style="border-top: 1px solid var(--card-border); padding-top: 10px;">
                        <label class="checkbox-group">
                            <input type="checkbox" id="use_edges">
                            <span>Outline Mode (Canny Edges)</span>
                        </label>
                    </div>

                    <div class="form-grid" id="canny_params_frame" style="display: none;">
                        <div class="input-group">
                            <label>Thresh 1</label>
                            <input type="number" id="thresh1" value="50">
                        </div>
                        <div class="input-group">
                            <label>Thresh 2</label>
                            <input type="number" id="thresh2" value="150">
                        </div>
                    </div>

                    <div class="input-group" style="border-top: 1px solid var(--card-border); padding-top: 10px;">
                        <label class="checkbox-group">
                            <input type="checkbox" id="use_custom_shape" checked>
                            <span>Custom Panel Shape (Silhouette)</span>
                        </label>
                    </div>

                    <div class="input-group">
                        <label class="checkbox-group">
                            <input type="checkbox" id="ground_bottom">
                            <span>Ground Bottom Silhouette</span>
                        </label>
                    </div>

                    <div class="input-group">
                        <label class="checkbox-group">
                            <input type="checkbox" id="draw_slits">
                            <span>Add Alignment Slits (Mortise)</span>
                        </label>
                    </div>
                </div>
            </details>

        </div>

        <!-- Sticky Bottom Buttons -->
        <div class="action-bar-fixed">
            <button class="btn btn-secondary" id="btn-generate"><i class="fa-solid fa-play"></i> Run</button>
            <button class="btn" id="btn-export"><i class="fa-solid fa-file-zipper"></i> Export ZIP</button>
        </div>

        <!-- Main Workspace -->
        <div class="main-content">
            <div class="previews-container">
                <!-- Target Preview -->
                <div class="preview-box">
                    <div class="preview-title"><i class="fa-solid fa-bullseye"></i> Preprocessed Silhouette</div>
                    <div class="canvas-container">
                        <canvas id="canvasTargetPreview"></canvas>
                    </div>
                </div>

                <!-- Unfolded Layout Preview -->
                <div class="preview-box">
                    <div class="preview-title"><i class="fa-solid fa-map"></i> Unfolded Lamp Template</div>
                    <div class="canvas-container">
                        <canvas id="canvasCrossPreview"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- OpenCV Module Script Load -->
    <script>
        var Module = {
            onRuntimeInitialized: function() {
                console.log("OpenCV.js core successfully initialized.");
                document.getElementById("loading-overlay").style.opacity = 0;
                setTimeout(() => {
                    document.getElementById("loading-overlay").style.display = "none";
                }, 500);
                
                initApp();
            }
        };
    </script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>

    <!-- Custom Script Logic -->
    <script>
        let rawTargetImage = null; 
        let preprocessedTargetMat = null; 
        
        let wallLeft = null;
        let wallRight = null;
        let wallTop = null;
        let wallBottom = null;
        let crossLayout = null; 

        function initApp() {
            rawTargetImage = generateDefaultSilhouette();
            setupEventListeners();
            updateProjections();
        }

        function generateDefaultSilhouette() {
            let canvas = document.createElement('canvas');
            canvas.width = 600;
            canvas.height = 800;
            let ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 600, 800);
            
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(300, 250, 80, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.ellipse(300, 480, 160, 150, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.ellipse(180, 580, 80, 120, Math.PI/6, 0, Math.PI * 2);
            ctx.ellipse(420, 580, 80, 120, -Math.PI/6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.arc(270, 240, 10, 0, Math.PI, true);
            ctx.arc(330, 240, 10, 0, Math.PI, true);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(300, 270, 30, 0.1 * Math.PI, 0.9 * Math.PI);
            ctx.stroke();
            
            return canvas;
        }

        function setupEventListeners() {
            document.getElementById('imageFileInput').addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    let reader = new FileReader();
                    reader.onload = function(event) {
                        let img = new Image();
                        img.onload = function() {
                            let tempCanvas = document.createElement('canvas');
                            tempCanvas.width = img.width;
                            tempCanvas.height = img.height;
                            let tempCtx = tempCanvas.getContext('2d');
                            tempCtx.drawImage(img, 0, 0);
                            rawTargetImage = tempCanvas;
                            document.getElementById('upload-label').innerText = e.target.files[0].name;
                            updateProjections();
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            });

            let sliders = ['img_scale', 'offset_x', 'offset_y'];
            sliders.forEach(id => {
                let elem = document.getElementById(id);
                elem.addEventListener('input', function() {
                    let suffix = (id === 'img_scale') ? '%' : ' mm';
                    document.getElementById('val_' + id).innerText = elem.value + suffix;
                    updateProjections();
                });
            });

            document.getElementById('use_edges').addEventListener('change', function(e) {
                document.getElementById('canny_params_frame').style.display = e.target.checked ? 'grid' : 'none';
                updateProjections();
            });

            let autoTriggers = ['box_w', 'box_h', 'box_d', 'light_z', 'front_z', 'target_w', 'target_h', 'res_val', 'use_custom_shape', 'ground_bottom', 'draw_slits', 'thresh1', 'thresh2'];
            autoTriggers.forEach(id => {
                document.getElementById(id).addEventListener('change', updateProjections);
            });
            document.querySelectorAll('input[name="panel_type"]').forEach(radio => {
                radio.addEventListener('change', updateProjections);
            });

            document.getElementById('btn-autofit').addEventListener('click', autoFitSilhouette);
            document.getElementById('btn-generate').addEventListener('click', updateProjections);
            document.getElementById('btn-export').addEventListener('click', exportZipArchive);
        }

        function preprocessSilhouette(srcMat, target_w_mm, target_h_mm, use_edges, thresh1, thresh2, use_custom_shape, ground_bottom) {
            let binary = new cv.Mat();
            let target_aspect = target_w_mm / target_h_mm;
            
            if (use_custom_shape) {
                let smoothed = new cv.Mat();
                cv.bilateralFilter(srcMat, smoothed, 9, 75, 75);
                
                let thresh = new cv.Mat();
                cv.threshold(smoothed, thresh, 100, 255, cv.THRESH_BINARY_INV);
                
                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                
                let body_mask = cv.Mat.zeros(srcMat.rows, srcMat.cols, cv.CV_8UC1);
                if (contours.size() > 0) {
                    let max_idx = 0;
                    let max_area = 0;
                    for (let i = 0; i < contours.size(); i++) {
                        let area = cv.contourArea(contours.get(i));
                        if (area > max_area) {
                            max_area = area;
                            max_idx = i;
                        }
                    }
                    
                    let color = new cv.Scalar(255);
                    cv.drawContours(body_mask, contours, max_idx, color, -1, cv.LINE_8, hierarchy, 0);
                    
                    let kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(25, 25));
                    cv.morphologyEx(body_mask, body_mask, cv.MORPH_CLOSE, kernel);
                }
                
                if (ground_bottom) {
                    let h_mask = body_mask.rows;
                    let w_mask = body_mask.cols;
                    let cols_sum = new Int32Array(w_mask);
                    for (let c = 0; c < w_mask; c++) {
                        let sum = 0;
                        for (let r = 0; r < h_mask; r++) {
                            if (body_mask.ucharAt(r, c) > 0) {
                                sum += 1;
                            }
                        }
                        cols_sum[c] = sum;
                    }
                    
                    let c_min = -1, c_max = -1;
                    for (let c = 0; c < w_mask; c++) {
                        if (cols_sum[c] > 0) {
                            if (c_min === -1) c_min = c;
                            c_max = c;
                        }
                    }
                    
                    if (c_min !== -1) {
                        let span_w = c_max - c_min;
                        let start_c = Math.round(c_min + 0.225 * span_w);
                        let end_c = Math.round(c_min + 0.775 * span_w);
                        
                        for (let c = start_c; c < end_c; c++) {
                            let r_max = -1;
                            for (let r = h_mask - 1; r >= 0; r--) {
                                if (body_mask.ucharAt(r, c) > 0) {
                                    r_max = r;
                                    break;
                                }
                            }
                            if (r_max !== -1) {
                                for (let r = r_max; r < h_mask; r++) {
                                    body_mask.setUCharAt(r, c, 255);
                                }
                            }
                        }
                    }
                }
                
                let edges = new cv.Mat();
                cv.Canny(smoothed, edges, thresh1, thresh2);
                let kernel_edge = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(3, 3));
                cv.dilate(edges, edges, kernel_edge);
                
                let body_minus_edges = new cv.Mat();
                cv.subtract(body_mask, edges, body_minus_edges);
                cv.bitwise_not(body_minus_edges, binary);
                
                smoothed.delete(); thresh.delete(); contours.delete(); hierarchy.delete(); body_mask.delete(); edges.delete();
            } else if (use_edges) {
                let smoothed = new cv.Mat();
                cv.bilateralFilter(srcMat, smoothed, 9, 75, 75);
                let edges = new cv.Mat();
                cv.Canny(smoothed, edges, thresh1, thresh2);
                let kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(3, 3));
                cv.dilate(edges, edges, kernel);
                cv.bitwise_not(edges, binary);
                
                smoothed.delete(); edges.delete();
            } else {
                cv.threshold(srcMat, binary, 127, 255, cv.THRESH_BINARY);
            }
            
            let img_h = binary.rows;
            let img_w = binary.cols;
            let img_aspect = img_w / img_h;
            
            let padded;
            if (img_aspect > target_aspect) {
                let new_h = Math.round(img_w / target_aspect);
                let pad = Math.round((new_h - img_h) / 2);
                padded = new cv.Mat(new_h, img_w, cv.CV_8UC1, new cv.Scalar(255));
                
                let rect = new cv.Rect(0, pad, img_w, img_h);
                let roi = padded.roi(rect);
                binary.copyTo(roi);
                roi.delete();
            } else {
                let new_w = Math.round(img_h * target_aspect);
                let pad = Math.round((new_w - img_w) / 2);
                padded = new cv.Mat(img_h, new_w, cv.CV_8UC1, new cv.Scalar(255));
                
                let rect = new cv.Rect(pad, 0, img_w, img_h);
                let roi = padded.roi(rect);
                binary.copyTo(roi);
                roi.delete();
            }
            
            binary.delete();
            return padded;
        }

        function projectWallPanel(wall_name, targetImgData, target_w_mm, target_h_mm, box_w, box_h, box_d, Z_start, Z_end, Z_light, pixels_per_mm, panel_bg, scale_factor, offset_x, offset_y) {
            let W_res = Math.round(box_w * pixels_per_mm);
            let H_res = Math.round(box_h * pixels_per_mm);
            let D_res = Math.round(box_d * pixels_per_mm);
            
            let w, h;
            if (wall_name === 'left' || wall_name === 'right') {
                w = D_res;
                h = H_res;
            } else {
                w = W_res;
                h = D_res;
            }
            
            let panelData = new Uint8Array(w * h);
            panelData.fill(panel_bg);
            
            let tgt_w = targetImgData.width;
            let tgt_h = targetImgData.height;
            let tgt_pixels = targetImgData.data;
            
            for (let r = 0; r < h; r++) {
                for (let c = 0; c < w; c++) {
                    let X_wall, Y_wall, Z_wall;
                    
                    if (wall_name === 'left') {
                        Z_wall = Z_end - (c / (D_res - 1)) * box_d;
                        Y_wall = box_h / 2.0 - (r / (H_res - 1)) * box_h;
                        X_wall = -box_w / 2.0;
                    } else if (wall_name === 'right') {
                        Z_wall = Z_end - (c / (D_res - 1)) * box_d;
                        Y_wall = box_h / 2.0 - (r / (H_res - 1)) * box_h;
                        X_wall = box_w / 2.0;
                    } else if (wall_name === 'top') {
                        X_wall = -box_w / 2.0 + (c / (W_res - 1)) * box_w;
                        Z_wall = Z_end - (r / (D_res - 1)) * box_d;
                        Y_wall = box_h / 2.0;
                    } else if (wall_name === 'bottom') {
                        X_wall = -box_w / 2.0 + (c / (W_res - 1)) * box_w;
                        Z_wall = Z_end - (r / (D_res - 1)) * box_d;
                        Y_wall = -box_h / 2.0;
                    }
                    
                    if (Z_wall >= Z_light) continue;
                    
                    let denom = Z_light - Z_wall;
                    let t = Z_light / denom;
                    
                    let X_w = X_wall * t;
                    let Y_w = Y_wall * t;
                    
                    let X_w_trans = (X_w - offset_x) / scale_factor;
                    let Y_w_trans = (Y_w - offset_y) / scale_factor;
                    
                    let col_tgt = Math.round((X_w_trans + target_w_mm / 2.0) / target_w_mm * (tgt_w - 1));
                    let row_tgt = Math.round(((target_h_mm / 2.0) - Y_w_trans) / target_h_mm * (tgt_h - 1));
                    
                    if (col_tgt >= 0 && col_tgt < tgt_w && row_tgt >= 0 && row_tgt < tgt_h) {
                        let idx = (row_tgt * tgt_w + col_tgt) * 4;
                        panelData[r * w + c] = tgt_pixels[idx]; 
                    }
                }
            }
            
            if (panel_bg === 0) {
                for (let i = 0; i < panelData.length; i++) {
                    panelData[i] = 255 - panelData[i];
                }
            }
            
            return { data: panelData, width: w, height: h };
        }

        function assembleCrossFoldLayout(left, right, top, bottom, box_w, box_h, box_d, pixels_per_mm, panel_bg, draw_slits) {
            let W_res = Math.round(box_w * pixels_per_mm);
            let H_res = Math.round(box_h * pixels_per_mm);
            let D_res = Math.round(box_d * pixels_per_mm);
            
            let canvas_w = 2 * D_res + W_res;
            let canvas_h = 2 * D_res + H_res;
            
            let canvas = document.createElement('canvas');
            canvas.width = canvas_w;
            canvas.height = canvas_h;
            let ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas_w, canvas_h);
            
            let base_x_start = D_res;
            let base_y_start = D_res;
            let base_x_end = D_res + W_res;
            let base_y_end = D_res + H_res;
            
            ctx.fillStyle = '#f0f0f5';
            ctx.fillRect(base_x_start, base_y_start, W_res, H_res);
            
            ctx.strokeStyle = '#646473';
            ctx.lineWidth = 2;
            ctx.strokeRect(base_x_start, base_y_start, W_res, H_res);
            
            let center_x = base_x_start + Math.floor(W_res / 2);
            let center_y = base_y_start + Math.floor(H_res / 2);
            ctx.fillStyle = '#32323c';
            ctx.beginPath();
            ctx.arc(center_x, center_y, Math.round(5 * pixels_per_mm), 0, Math.PI * 2);
            ctx.fill();
            
            function drawPanel(panel, dx, dy, flipCode) {
                let p = panel;
                if (flipCode !== undefined) {
                    p = cvFlip(panel, flipCode);
                }
                let imgData = ctx.createImageData(p.width, p.height);
                for (let i = 0; i < p.data.length; i++) {
                    let val = p.data[i];
                    imgData.data[i * 4] = val;
                    imgData.data[i * 4 + 1] = val;
                    imgData.data[i * 4 + 2] = val;
                    imgData.data[i * 4 + 3] = 255;
                }
                ctx.putImageData(imgData, dx, dy);
            }
            
            function cvFlip(panel, flipCode) {
                let w = panel.width;
                let h = panel.height;
                let src = panel.data;
                let dst = new Uint8Array(w * h);
                for (let r = 0; r < h; r++) {
                    for (let c = 0; c < w; c++) {
                        let src_r = r;
                        let src_c = c;
                        if (flipCode === 0) src_r = h - 1 - r;
                        else if (flipCode === 1) src_c = w - 1 - c;
                        dst[r * w + c] = src[src_r * w + src_c];
                    }
                }
                return { data: dst, width: w, height: h };
            }
            
            drawPanel(top, base_x_start, 0);
            drawPanel(bottom, base_x_start, base_y_end, 0); 
            drawPanel(left, 0, base_y_start);
            drawPanel(right, base_x_end, base_y_start, 1); 
            
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#7f7f8c';
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.moveTo(base_x_start, base_y_start);
            ctx.lineTo(base_x_end, base_y_start);
            ctx.moveTo(base_x_start, base_y_end);
            ctx.lineTo(base_x_end, base_y_end);
            ctx.moveTo(base_x_start, base_y_start);
            ctx.lineTo(base_x_start, base_y_end);
            ctx.moveTo(base_x_end, base_y_start);
            ctx.lineTo(base_x_end, base_y_end);
            ctx.stroke();
            ctx.setLineDash([]); 
            
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 3;
            ctx.strokeRect(0, 0, canvas_w, canvas_h);
            
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, base_y_start); ctx.lineTo(base_x_start, base_y_start);
            ctx.moveTo(0, base_y_end); ctx.lineTo(base_x_start, base_y_end);
            ctx.moveTo(base_x_end, base_y_start); ctx.lineTo(canvas_w, base_y_start);
            ctx.moveTo(base_x_end, base_y_end); ctx.lineTo(canvas_w, base_y_end);
            
            ctx.moveTo(base_x_start, 0); ctx.lineTo(base_x_start, base_y_start);
            ctx.moveTo(base_x_end, 0); ctx.lineTo(base_x_end, base_y_start);
            ctx.moveTo(base_x_start, base_y_end); ctx.lineTo(base_x_start, canvas_h);
            ctx.moveTo(base_x_end, base_y_end); ctx.lineTo(base_x_end, canvas_h);
            ctx.stroke();
            
            if (draw_slits) {
                let slit_w = Math.max(1, Math.round(3 * pixels_per_mm));
                let slit_l = Math.max(1, Math.round(30 * pixels_per_mm));
                ctx.fillStyle = (panel_bg === 255) ? '#ffffff' : '#000000';
                
                ctx.fillRect(center_x - Math.floor(slit_w/2), base_y_start - Math.floor(slit_l/2), slit_w, slit_l);
                ctx.fillRect(center_x - Math.floor(slit_w/2), base_y_end - Math.floor(slit_l/2), slit_w, slit_l);
                ctx.fillRect(base_x_start - Math.floor(slit_l/2), center_y - Math.floor(slit_w/2), slit_l, slit_w);
                ctx.fillRect(base_x_end - Math.floor(slit_l/2), center_y - Math.floor(slit_w/2), slit_l, slit_w);
            }
            
            ctx.fillStyle = '#8a8a9e';
            ctx.font = '14px Outfit';
            ctx.fillText("LEFT", 20, center_y + 5);
            ctx.fillText("RIGHT", base_x_end + 20, center_y + 5);
            ctx.fillText("TOP", base_x_start + 20, 30);
            ctx.fillText("BOTTOM", base_x_start + 20, base_y_end + 30);
            
            return canvas;
        }

        function updateProjections() {
            if (!rawTargetImage || typeof cv === 'undefined' || !cv.Mat) return;
            
            let box_w = parseFloat(document.getElementById('box_w').value);
            let box_h = parseFloat(document.getElementById('box_h').value);
            let box_d = parseFloat(document.getElementById('box_d').value);
            let light_z = parseFloat(document.getElementById('light_z').value);
            let front_z = parseFloat(document.getElementById('front_z').value);
            let target_w = parseFloat(document.getElementById('target_w').value);
            let target_h = parseFloat(document.getElementById('target_h').value);
            let res = parseFloat(document.getElementById('res_val').value);
            
            let panel_bg = parseInt(document.querySelector('input[name="panel_type"]:checked').value);
            let use_edges = document.getElementById('use_edges').checked;
            let thresh1 = parseInt(document.getElementById('thresh1').value);
            let thresh2 = parseInt(document.getElementById('thresh2').value);
            let use_custom_shape = document.getElementById('use_custom_shape').checked;
            let ground_bottom = document.getElementById('ground_bottom').checked;
            let draw_slits = document.getElementById('draw_slits').checked;
            
            let img_scale = parseFloat(document.getElementById('img_scale').value) / 100.0;
            let offset_x = parseFloat(document.getElementById('offset_x').value);
            let offset_y = parseFloat(document.getElementById('offset_y').value);
            
            let src = cv.imread(rawTargetImage);
            let srcGray = new cv.Mat();
            cv.cvtColor(src, srcGray, cv.COLOR_RGBA2GRAY);
            
            let preprocessedMat = preprocessSilhouette(srcGray, target_w, target_h, use_edges, thresh1, thresh2, use_custom_shape, ground_bottom);
            
            let canvasTarget = document.getElementById('canvasTargetPreview');
            cv.imshow(canvasTarget, preprocessedMat);
            
            let tempCanvas = document.createElement('canvas');
            cv.imshow(tempCanvas, preprocessedMat);
            let targetImgData = tempCanvas.getContext('2d').getImageData(0, 0, tempCanvas.width, tempCanvas.height);
            
            wallLeft = projectWallPanel('left', targetImgData, target_w, target_h, box_w, box_h, box_d, 
                                        front_z, front_z + box_d, light_z, target_w, target_h, res, panel_bg, img_scale, offset_x, offset_y);
            wallRight = projectWallPanel('right', targetImgData, target_w, target_h, box_w, box_h, box_d, 
                                         front_z, front_z + box_d, light_z, target_w, target_h, res, panel_bg, img_scale, offset_x, offset_y);
            wallTop = projectWallPanel('top', targetImgData, target_w, target_h, box_w, box_h, box_d, 
                                       front_z, front_z + box_d, light_z, target_w, target_h, res, panel_bg, img_scale, offset_x, offset_y);
            wallBottom = projectWallPanel('bottom', targetImgData, target_w, target_h, box_w, box_h, box_d, 
                                          front_z, front_z + box_d, light_z, target_w, target_h, res, panel_bg, img_scale, offset_x, offset_y);
            
            let crossCanvas = assembleCrossFoldLayout(wallLeft, wallRight, wallTop, wallBottom, 
                                                     box_w, box_h, box_d, res, panel_bg, draw_slits);
            
            let canvasCross = document.getElementById('canvasCrossPreview');
            canvasCross.width = crossCanvas.width;
            canvasCross.height = crossCanvas.height;
            let crossCtx = canvasCross.getContext('2d');
            crossCtx.drawImage(crossCanvas, 0, 0);
            
            crossLayout = crossCanvas;
            
            src.delete(); srcGray.delete(); preprocessedMat.delete();
        }

        function autoFitSilhouette() {
            if (!rawTargetImage || typeof cv === 'undefined' || !cv.Mat) return;
            
            let box_h = parseFloat(document.getElementById('box_h').value);
            let box_d = parseFloat(document.getElementById('box_d').value);
            let light_z = parseFloat(document.getElementById('light_z').value);
            let front_z = parseFloat(document.getElementById('front_z').value);
            let target_h = parseFloat(document.getElementById('target_h').value);
            
            let src = cv.imread(rawTargetImage);
            let srcGray = new cv.Mat();
            cv.cvtColor(src, srcGray, cv.COLOR_RGBA2GRAY);
            
            let thresh = new cv.Mat();
            cv.threshold(srcGray, thresh, 240, 255, cv.THRESH_BINARY_INV);
            
            let y_indices = [];
            for (let r = 0; r < thresh.rows; r++) {
                for (let c = 0; c < thresh.cols; c++) {
                    if (thresh.ucharAt(r, c) > 0) {
                        y_indices.push(r);
                    }
                }
            }
            
            if (y_indices.length === 0) {
                alert("Could not detect any silhouette inside the image!");
                src.delete(); srcGray.delete(); thresh.delete();
                return;
            }
            
            let y_min_px = Math.min(...y_indices);
            let y_max_px = Math.max(...y_indices);
            
            let h_img = thresh.rows;
            let y_min = target_h / 2.0 - (y_max_px / (h_img - 1)) * target_h;
            let y_max = target_h / 2.0 - (y_min_px / (h_img - 1)) * target_h;
            let h_sil = y_max - y_min;
            
            let t_min = light_z / (light_z - front_z);
            let t_max = light_z / (light_z - (front_z + box_d));
            let h_box_proj = box_h * t_max;
            
            let scale = h_box_proj / h_sil;
            let scale_pct = Math.round(Math.min(500.0, Math.max(10.0, scale * 100.0)));
            
            let y_neck = y_max - 0.42 * h_sil;
            let y_box_top = (box_h / 2.0) * t_min;
            let shift_y = Math.round(y_box_top - (scale_pct / 100.0) * y_neck);
            
            document.getElementById('img_scale').value = scale_pct;
            document.getElementById('val_img_scale').innerText = scale_pct + "%";
            document.getElementById('offset_y').value = shift_y;
            document.getElementById('val_offset_y').innerText = shift_y + " mm";
            document.getElementById('offset_x').value = 0;
            document.getElementById('val_offset_x').innerText = "0 mm";
            
            src.delete(); srcGray.delete(); thresh.delete();
            updateProjections();
        }

        function exportZipArchive() {
            if (!crossLayout) {
                alert("Please generate a preview first!");
                return;
            }
            
            let zip = new JSZip();
            
            function addCanvasToZip(canvasName, canvasElement) {
                let dataUrl = canvasElement.toDataURL("image/png");
                let dataBase64 = dataUrl.split(',')[1];
                zip.file(canvasName + ".png", dataBase64, {base64: true});
            }
            
            function createPanelCanvas(panelObj) {
                let c = document.createElement('canvas');
                c.width = panelObj.width;
                c.height = panelObj.height;
                let ctx = c.getContext('2d');
                let imgData = ctx.createImageData(panelObj.width, panelObj.height);
                for (let i = 0; i < panelObj.data.length; i++) {
                    let val = panelObj.data[i];
                    imgData.data[i * 4] = val;
                    imgData.data[i * 4 + 1] = val;
                    imgData.data[i * 4 + 2] = val;
                    imgData.data[i * 4 + 3] = 255;
                }
                ctx.putImageData(imgData, 0, 0);
                return c;
            }

            addCanvasToZip("wall_left", createPanelCanvas(wallLeft));
            addCanvasToZip("wall_right", createPanelCanvas(wallRight));
            addCanvasToZip("wall_top", createPanelCanvas(wallTop));
            addCanvasToZip("wall_bottom", createPanelCanvas(wallBottom));
            addCanvasToZip("cross_fold_layout", crossLayout);
            
            let targetCanvas = document.getElementById('canvasTargetPreview');
            addCanvasToZip("preprocessed_target", targetCanvas);
            
            zip.generateAsync({type:"blob"}).then(function(content) {
                let link = document.createElement('a');
                link.download = "shadow_lamp_panels.zip";
                link.href = URL.createObjectURL(content);
                link.click();
            });
        }
