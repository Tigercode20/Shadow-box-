<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 مولد صناديق الظلال الاحترافي</title>
    <style>
        :root {
            --primary-color: #0070f3;
            --bg-color: #f5f5f7;
            --panel-bg: #ffffff;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 900px;
            background: var(--panel-bg);
            margin: 0 auto;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .controls {
            background: #fafafa;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            border: 1px solid #eaeaea;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        input[type="range"] {
            width: 200px;
        }

        canvas {
            max-width: 100%;
            height: auto;
            border: 2px dashed #ccc;
            border-radius: 8px;
            margin-top: 20px;
            background: #fff;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            display: inline-block;
            text-decoration: none;
        }

        #loading {
            color: #ff3b30;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onOpenCvReady();"></script>
</head>
<body>

<div class="container">
    <h2>📐 مولد صناديق الظلال الهرمي العكسي (مخطط مستقيم)</h2>
    <p>يقوم بمط تفاصيل الشخصية داخلياً مع الحفاظ على أطراف الصندوق مستقيمة وعمودية بنسبة 100%</p>
    
    <div id="loading">🔄 جاري تهيئة محرك الهندسة البصرية...</div>

    <div class="controls">
        <div>
            <label style="font-weight:600;">📁 ارفع الصورة: </label>
            <input type="file" id="fileInput" accept="image/*" disabled>
        </div>
        
        <div class="slider-group">
            <label for="thresholdSlider">🎚️ درجة العزل (Threshold): <span id="threshVal">115</span></label>
            <input type="range" id="thresholdSlider" min="0" max="255" value="115" disabled>
        </div>

        <div class="slider-group">
            <label for="skewSlider">📐 نسبة مط المنظور الداخلي: <span id="skewVal">30%</span></label>
            <input type="range" id="skewSlider" min="5" max="60" value="30" disabled>
        </div>
    </div>

    <div>
        <canvas id="canvasOutput"></canvas>
    </div>
    
    <button class="btn" id="downloadBtn" style="display:none;">💾 تحميل المخطط النهائي</button>
</div>

<script>
    let imgElement = new Image();
    let fileInput = document.getElementById('fileInput');
    let thresholdSlider = document.getElementById('thresholdSlider');
    let skewSlider = document.getElementById('skewSlider');
    let downloadBtn = document.getElementById('downloadBtn');

    function onOpenCvReady() {
        document.getElementById('loading').style.display = 'none';
        fileInput.disabled = false;
        thresholdSlider.disabled = false;
        skewSlider.disabled = false;
    }

    fileInput.addEventListener('change', (e) => {
        if(e.target.files.length > 0) {
            let reader = new FileReader();
            reader.onload = (event) => { imgElement.src = event.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        }
    });

    imgElement.onload = () => { processShadowBox(); };
    thresholdSlider.addEventListener('input', () => {
        document.getElementById('threshVal').innerText = thresholdSlider.value;
        if(imgElement.src) processShadowBox();
    });
    skewSlider.addEventListener('input', () => {
        document.getElementById('skewVal').innerText = skewSlider.value + "%";
        if(imgElement.src) processShadowBox();
    });

    function processShadowBox() {
        if (!cv.Mat) return;

        let src = cv.imread(imgElement);
        let gray = new cv.Mat();
        let binary = new cv.Mat();

        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
        cv.threshold(gray, binary, parseInt(thresholdSlider.value), 255, cv.THRESH_BINARY_INV);

        let h = binary.rows;
        let w = binary.cols;

        // تحديد أبعاد جدران الصندوق (المستطيلات)
        let sideW = Math.floor(w * 0.4);
        let sideH = Math.floor(h * 0.4);

        // إنشاء اللوحة القماشية الكبيرة (شكل الصليب المستقيم)
        let canvasW = w + (sideW * 2);
        let canvasH = h + (sideH * 2);
        let canvasMat = new cv.Mat(canvasH, canvasW, cv.CV_8UC1, new cv.Scalar(255));

        // إحداثيات المربع المركزي الثابت (BOX)
        let bx1 = sideW;
        let by1 = sideH;
        let bx2 = bx1 + w;
        let by2 = by1 + h;

        // رسم المربع المركزي
        cv.rectangle(canvasMat, new cv.Point(bx1, by1), new cv.Point(bx2, by2), new cv.Scalar(230), -1);

        // معامل مط المنظور الداخلي للرسمة
        let skewPct = parseInt(skewSlider.value) / 100;
        let skewShiftW = Math.floor(w * skewPct);
        let skewShiftH = Math.floor(h * skewPct);

        function applyWarpAndPaste(srcCrop, srcCoords, dstCoords, dstX, dstY, dstW, dstH) {
            let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, srcCoords);
            let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, dstCoords);
            let M = cv.getPerspectiveTransform(srcTri, dstTri);
            
            let warped = new cv.Mat();
            cv.warpPerspective(srcCrop, warped, M, new cv.Size(dstW, dstH));
            
            // دمج الجزء داخل مستطيل الطرف المخصص له على اللوحة
            let roi = canvasMat.roi(new cv.Rect(dstX, dstY, dstW, dstH));
            warped.copyTo(roi);

            srcTri.delete(); dstTri.delete(); M.delete(); warped.delete(); roi.delete();
        }

        // 1. الطرف العلوي (Top) -> مستطيل مستقيم تماماً، لكن الصورة جواه ممتدة من الأعلى وضيقة من الأسفل
        let topCrop = binary.roi(new cv.Rect(0, 0, w, sideH));
        let tSrc = [0, 0,  w, 0,  0, topCrop.rows,  w, topCrop.rows];
        let tDst = [
            -skewShiftW, 0, 
            w + skewShiftW, 0, 
            0, topCrop.rows, 
            w, topCrop.rows
        ];
        // تدوير الجزء العلوي للأعلى قبل الدمج ليطابق التخطيط المفرود
        let topRot = new cv.Mat();
        cv.rotate(topCrop, topRot, cv.ROTATE_180);
        applyWarpAndPaste(topRot, tSrc, tDst, bx1, by1 - sideH, w, sideH);
        topRot.delete(); topCrop.delete();

        // 2. الطرف السفلي (Lower) -> مستطيل مستقيم، الصورة ممتدة من الأسفل وضامّة من الأعلى
        let botCrop = binary.roi(new cv.Rect(0, h - sideH, w, sideH));
        let bSrc = [0, 0,  w, 0,  0, botCrop.rows,  w, botCrop.rows];
        let bDst = [
            0, 0, 
            w, 0, 
            -skewShiftW, botCrop.rows, 
            w + skewShiftW, botCrop.rows
        ];
        applyWarpAndPaste(botCrop, bSrc, bDst, bx1, by2, w, sideH);
        botCrop.delete();

        // 3. الطرف الأيسر (Left) -> مستطيل مستقيم، ممتد من اليسار وضامّ من اليمين
        let leftCrop = binary.roi(new cv.Rect(0, 0, sideW, h));
        let lSrc = [0, 0,  leftCrop.cols, 0,  0, h,  leftCrop.cols, h];
        let lDst = [
            0, -skewShiftH, 
            leftCrop.cols, 0, 
            0, h + skewShiftH, 
            leftCrop.cols, h
        ];
        let leftRot = new cv.Mat();
        cv.rotate(leftCrop, leftRot, cv.ROTATE_90_COUNTERCLOCKWISE);
        // تبديل الأبعاد لتتناسب مع التدوير
        let lSrcRot = [0, 0,  h, 0,  0, sideW,  h, sideW];
        let lDstRot = [
            -skewShiftH, 0, 
            h + skewShiftH, 0, 
            0, sideW, 
            h, sideW
        ];
        applyWarpAndPaste(leftRot, lSrcRot, lDstRot, bx1 - h, by1, h, sideW);
        leftRot.delete(); leftCrop.delete();

        // 4. الطرف الأيمن (Right) -> مستطيل مستقيم، ضامّ من اليسار وممتد من اليمين
        let rightCrop = binary.roi(new cv.Rect(w - sideW, 0, sideW, h));
        let rightRot = new cv.Mat();
        cv.rotate(rightCrop, rightRot, cv.ROTATE_90_CLOCKWISE);
        let rSrcRot = [0, 0,  h, 0,  0, sideW,  h, sideW];
        let rDstRot = [
            0, 0, 
            h, 0, 
            -skewShiftH, sideW, 
            h + skewShiftH, sideW
        ];
        applyWarpAndPaste(rightRot, rSrcRot, rDstRot, bx2, by1, h, sideW);
        rightRot.delete(); rightCrop.delete();


        cv.imshow('canvasOutput', canvasMat);
        downloadBtn.style.display = 'inline-block';

        src.delete(); gray.delete(); binary.delete(); canvasMat.delete();
    }

    downloadBtn.addEventListener('click', () => {
        let canvas = document.getElementById('canvasOutput');
        let link = document.createElement('a');
        link.download = 'perfect-box-layout.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
</script>

</body>
</html>
