<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 مولد صناديق الظلال الاحترافي المستقر</title>
    <style>
        :root {
            --primary-color: #0070f3;
            --bg-color: #f5f5f7;
            --panel-bg: #ffffff;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 900px;
            background: var(--panel-bg);
            margin: 0 auto;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .controls {
            background: #fafafa;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            border: 1px solid #eaeaea;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        input[type="range"] {
            width: 200px;
        }

        canvas {
            max-width: 100%;
            height: auto;
            border: 2px dashed #ccc;
            border-radius: 8px;
            margin-top: 20px;
            background: #fff;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            display: inline-block;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📐 مولد صناديق الظلال الهرمي العكسي (مخطط مستقيم ومستقر)</h2>
    <p>تعديل مستقر 100% يقوم بمط تفاصيل الشخصية داخلياً مع الحفاظ على أطراف الصندوق مستقيمة كصورة بلندر</p>
    
    <div class="controls">
        <div>
            <label style="font-weight:600;">📁 ارفع الصورة: </label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <div class="slider-group">
            <label for="thresholdSlider">🎚️ درجة العزل (Threshold): <span id="threshVal">127</span></label>
            <input type="range" id="thresholdSlider" min="0" max="255" value="127">
        </div>

        <div class="slider-group">
            <label for="skewSlider">📐 نسبة مط المنظور الداخلي: <span id="skewVal">40%</span></label>
            <input type="range" id="skewSlider" min="10" max="100" value="40">
        </div>
    </div>

    <div>
        <canvas id="canvasOutput"></canvas>
    </div>
    
    <button class="btn" id="downloadBtn" style="display:none;">💾 تحميل المخطط النهائي</button>
</div>

<script>
    let imgElement = new Image();
    let fileInput = document.getElementById('fileInput');
    let thresholdSlider = document.getElementById('thresholdSlider');
    let skewSlider = document.getElementById('skewSlider');
    let downloadBtn = document.getElementById('downloadBtn');
    let canvas = document.getElementById('canvasOutput');
    let ctx = canvas.getContext('2d');

    fileInput.addEventListener('change', (e) => {
        if(e.target.files.length > 0) {
            let reader = new FileReader();
            reader.onload = (event) => { imgElement.src = event.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        }
    });

    imgElement.onload = () => { processShadowBox(); };
    thresholdSlider.addEventListener('input', () => {
        document.getElementById('threshVal').innerText = thresholdSlider.value;
        if(imgElement.src) processShadowBox();
    });
    skewSlider.addEventListener('input', () => {
        document.getElementById('skewVal').innerText = skewSlider.value + "%";
        if(imgElement.src) processShadowBox();
    });

    function processShadowBox() {
        let w = imgElement.width;
        let h = imgElement.height;

        // حساب أبعاد الصندوق والأطراف المفرودة
        let sideW = Math.floor(w * 0.45);
        let sideH = Math.floor(h * 0.45);

        canvas.width = w + (sideW * 2);
        canvas.height = h + (sideH * 2);

        // خلفية بيضاء بالكامل
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // رسم المربع المركزي (BOX) بالرمادي
        let bx1 = sideW;
        let by1 = sideH;
        ctx.fillStyle = "#e0e0e0";
        ctx.fillRect(bx1, by1, w, h);

        // إنشاء كافاس مؤقت لتطبيق تأثير الـ Threshold (أسود وأبيض)
        let tempCanvas = document.createElement('canvas');
        tempCanvas.width = w;
        tempCanvas.height = h;
        let tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(imgElement, 0, 0);

        let imgData = tempCtx.getImageData(0, 0, w, h);
        let data = imgData.data;
        let thresh = parseInt(thresholdSlider.value);

        for (let i = 0; i < data.length; i += 4) {
            let brightness = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
            let val = (brightness > thresh) ? 255 : 0; // عكس الألوان ليكون قالب القص أسود
            data[i] = val; data[i+1] = val; data[i+2] = val;
        }
        tempCtx.putImageData(imgData, 0, 0);

        let skewFactor = parseInt(skewSlider.value) / 100;

        // دالة مبتكرة لعمل سحب ومط للمنظور (Perspective Deform) سطر بسطر لضمان الاستقرار
        function drawPerspectiveSide(sourceY, sourceH, targetX, targetY, targetW, targetH, direction) {
            let sliceCanvas = document.createElement('canvas');
            sliceCanvas.width = w;
            sliceCanvas.height = sourceH;
            let sliceCtx = sliceCanvas.getContext('2d');
            sliceCtx.drawImage(tempCanvas, 0, sourceY, w, sourceH, 0, 0, w, sourceH);

            // إنشاء تدوير للجدران لتفرد للخارج
            ctx.save();
            ctx.translate(targetX + targetW/2, targetY + targetH/2);
            if (direction === 'top') ctx.rotate(Math.PI);
            if (direction === 'left') ctx.rotate(Math.PI / 2);
            if (direction === 'right') ctx.rotate(-Math.PI / 2);
            ctx.translate(-targetW/2, -targetH/2);

            // عملية المط التدريجي الشبيهة بالهرم العكسي
            for (let y = 0; y < targetH; y++) {
                let progress = y / targetH;
                // المط يزداد كلما ابتعدنا عن المركز
                let scale = 1 + (progress * skewFactor); 
                let sliceW = targetW * scale;
                let sliceX = (targetW - sliceW) / 2;

                ctx.drawImage(sliceCanvas, 0, Math.floor((y/targetH) * sourceH), w, 1, sliceX, y, sliceW, 1);
            }
            ctx.restore();
        }

        // 1. الطرف العلوي (Top)
        drawPerspectiveSide(0, sideH, bx1, by1 - sideH, w, sideH, 'top');

        // 2. الطرف السفلي (Lower)
        drawPerspectiveSide(h - sideH, sideH, bx1, by1 + h, w, sideH, 'bottom');

        // 3. الطرف الأيسر (Left) - نقوم بقص الجزء الأيسر ومطه بالتناسب بعد تعديل الأبعاد للتدوير
        drawPerspectiveSide(0, h, bx1 - sideW, by1, sideW, h, 'left');

        // 4. الطرف الأيمن (Right)
        drawPerspectiveSide(0, h, bx1 + w, by1, sideW, h, 'right');

        downloadBtn.style.display = 'inline-block';
    }

    downloadBtn.addEventListener('click', () => {
        let link = document.createElement('a');
        link.download = 'perfect-shadow-box.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
</script>

</body>
</html>
