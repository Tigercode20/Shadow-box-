<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 مولد صناديق الظلال المطابق لـ Blender</title>
    <style>
        :root {
            --primary-color: #0070f3;
            --bg-color: #f5f5f7;
            --panel-bg: #ffffff;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 900px;
            background: var(--panel-bg);
            margin: 0 auto;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .controls {
            background: #fafafa;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            border: 1px solid #eaeaea;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        input[type="range"] {
            width: 200px;
        }

        canvas {
            max-width: 100%;
            height: auto;
            border: 2px dashed #ccc;
            border-radius: 8px;
            margin-top: 20px;
            background: #fff;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            display: inline-block;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📐 مولد صناديق الظلال (Linear Stretch)</h2>
    <p>مطابق تماماً لنموذج بلندر - يقوم بقص وفرد الجدران مع مط التفاصيل بشكل مستقيم ونظيف</p>
    
    <div class="controls">
        <div>
            <label style="font-weight:600;">📁 ارفع الصورة: </label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <div class="slider-group">
            <label for="thresholdSlider">🎚️ درجة العزل (Threshold): <span id="threshVal">127</span></label>
            <input type="range" id="thresholdSlider" min="0" max="255" value="127">
        </div>

        <div class="slider-group">
            <label for="stretchSlider">📐 نسبة مَطْ الأطراف (Stretch): <span id="stretchVal">40%</span></label>
            <input type="range" id="stretchSlider" min="10" max="100" value="40">
        </div>
    </div>

    <div>
        <canvas id="canvasOutput"></canvas>
    </div>
    
    <button class="btn" id="downloadBtn" style="display:none;">💾 تحميل المخطط النهائي</button>
</div>

<script>
    let imgElement = new Image();
    let fileInput = document.getElementById('fileInput');
    let thresholdSlider = document.getElementById('thresholdSlider');
    let stretchSlider = document.getElementById('stretchSlider');
    let downloadBtn = document.getElementById('downloadBtn');
    let canvas = document.getElementById('canvasOutput');
    let ctx = canvas.getContext('2d');

    fileInput.addEventListener('change', (e) => {
        if(e.target.files.length > 0) {
            let reader = new FileReader();
            reader.onload = (event) => { imgElement.src = event.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        }
    });

    imgElement.onload = () => { processShadowBox(); };
    thresholdSlider.addEventListener('input', () => {
        document.getElementById('threshVal').innerText = thresholdSlider.value;
        if(imgElement.src) processShadowBox();
    });
    stretchSlider.addEventListener('input', () => {
        document.getElementById('stretchVal').innerText = stretchSlider.value + "%";
        if(imgElement.src) processShadowBox();
    });

    function processShadowBox() {
        let w = imgElement.width;
        let h = imgElement.height;

        // تحديد أبعاد الصندوق الداخلي بدقة (BOX)
        let boxW = Math.floor(w * 0.45);
        let boxH = Math.floor(h * 0.55);

        // حجم الأطراف (الجدران المفرودة المستقيمة)
        let sideH = Math.floor(h * 0.35); 
        let sideW = Math.floor(w * 0.35);

        canvas.width = boxW + (sideW * 2);
        canvas.height = boxH + (sideH * 2);

        let bx1 = sideW;
        let by1 = sideH;

        // 1. رسم أرضية الهيكل الرمادي كقطعة واحدة متصلة تماماً مثل بلندر
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#b0b3b8"; // لون جدران الصندوق الرمادي
        ctx.fillRect(bx1, 0, boxW, canvas.height); // الجذع الطولي
        ctx.fillRect(0, by1, canvas.width, boxH);  // الجذع العرضي

        // 2. معالجة صورة الـ Threshold (أسود وأبيض)
        let tempCanvas = document.createElement('canvas');
        tempCanvas.width = w;
        tempCanvas.height = h;
        let tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(imgElement, 0, 0);

        let imgData = tempCtx.getImageData(0, 0, w, h);
        let data = imgData.data;
        let thresh = parseInt(thresholdSlider.value);

        for (let i = 0; i < data.length; i += 4) {
            let brightness = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
            let val = (brightness > thresh) ? 255 : 0; // أسود للشخصية وأبيض للخلفية
            data[i] = val; data[i+1] = val; data[i+2] = val;
        }
        tempCtx.putImageData(imgData, 0, 0);

        // نسبة مط الأطراف المستقيمة
        let stretchFactor = 1 + (parseInt(stretchSlider.value) / 100);

        // دالة مخصصة لعمل قطع ومط خطي مستقيم للأطراف الأربعة (بدون تشويه زوايا)
        function drawLinearSide(srcX, srcY, srcW, srcH, targetX, targetY, targetW, targetH, rotation) {
            ctx.save();
            
            // قناع لمنع خروج التفاصيل من الجدار المخصص لها
            ctx.beginPath();
            ctx.rect(targetX, targetY, targetW, targetH);
            ctx.clip();

            ctx.translate(targetX + targetW/2, targetY + targetH/2);
            ctx.rotate(rotation);
            ctx.translate(-targetW/2, -targetH/2);

            // رسم ومط الصورة بشكل مستقيم (Linear Scale)
            ctx.drawImage(tempCanvas, srcX, srcY, srcW, srcH, 0, 0, targetW, targetH * stretchFactor);
            
            ctx.restore();
        }

        // 3. توزيع التفاصيل داخل الأطراف مع مراعاة التدوير الصحيح للخارج
        // الطرف العلوي (الرأس) - مط عمودي للأعلى
        drawLinearSide(Math.floor(w*0.27), 0, boxW, sideH, bx1, 0, boxW, sideH, Math.PI);

        // الطرف السفلي (اليد) - مط عمودي للأسفل
        drawLinearSide(Math.floor(w*0.27), h - sideH, boxW, sideH, bx1, by1 + boxH, boxW, sideH, 0);

        // الطرف الأيسر (الذراع الأيسر) - مط أفقي لليسار
        drawLinearSide(0, Math.floor(h*0.22), sideW, boxH, 0, by1, sideW, boxH, Math.PI / 2);

        // الطرف الأيمن (الذراع الأيمن) - مط أفقي لليمين
        drawLinearSide(w - sideW, Math.floor(h*0.22), sideW, boxH, bx1 + boxW, by1, sideW, boxH, -Math.PI / 2);

        // 4. جعل المربع المركزي (أرضية الصندوق) مفرغاً باللون الرمادي الداكن تماماً كصورة بلندر
        ctx.fillStyle = "#3a3d42"; 
        ctx.fillRect(bx1, by1, boxW, boxH);

        downloadBtn.style.display = 'inline-block';
    }

    downloadBtn.addEventListener('click', () => {
        let link = document.createElement('a');
        link.download = 'blender-matched-shadowbox.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
</script>

</body>
</html>
