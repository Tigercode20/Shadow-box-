<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 مولد صناديق الظلال الهرمي الاحترافي</title>
    <style>
        :root {
            --primary-color: #0070f3;
            --bg-color: #f5f5f7;
            --panel-bg: #ffffff;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 900px;
            background: var(--panel-bg);
            margin: 0 auto;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .controls {
            background: #fafafa;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            border: 1px solid #eaeaea;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        input[type="range"] {
            width: 200px;
        }

        canvas {
            max-width: 100%;
            height: auto;
            border: 2px dashed #ccc;
            border-radius: 8px;
            margin-top: 20px;
            background: #fff;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            display: inline-block;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📐 مولد صناديق الظلال (مطابقة لـ Blender 100%)</h2>
    <p>تم إصلاح اتصال الصندوق، اتجاهات الـ Deform، ومنع تداخل الأجزاء الفراغية</p>
    
    <div class="controls">
        <div>
            <label style="font-weight:600;">📁 ارفع الصورة: </label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <div class="slider-group">
            <label for="thresholdSlider">🎚️ درجة العزل (Threshold): <span id="threshVal">127</span></label>
            <input type="range" id="thresholdSlider" min="0" max="255" value="127">
        </div>

        <div class="slider-group">
            <label for="skewSlider">📐 نسبة ضغط/مط المنظور: <span id="skewVal">30%</span></label>
            <input type="range" id="skewSlider" min="-100" max="100" value="-30">
        </div>
    </div>

    <div>
        <canvas id="canvasOutput"></canvas>
    </div>
    
    <button class="btn" id="downloadBtn" style="display:none;">💾 تحميل المخطط النهائي</button>
</div>

<script>
    let imgElement = new Image();
    let fileInput = document.getElementById('fileInput');
    let thresholdSlider = document.getElementById('thresholdSlider');
    let skewSlider = document.getElementById('skewSlider');
    let downloadBtn = document.getElementById('downloadBtn');
    let canvas = document.getElementById('canvasOutput');
    let ctx = canvas.getContext('2d');

    fileInput.addEventListener('change', (e) => {
        if(e.target.files.length > 0) {
            let reader = new FileReader();
            reader.onload = (event) => { imgElement.src = event.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        }
    });

    imgElement.onload = () => { processShadowBox(); };
    thresholdSlider.addEventListener('input', () => {
        document.getElementById('threshVal').innerText = thresholdSlider.value;
        if(imgElement.src) processShadowBox();
    });
    skewSlider.addEventListener('input', () => {
        document.getElementById('skewVal').innerText = skewSlider.value + "%";
        if(imgElement.src) processShadowBox();
    });

    function processShadowBox() {
        let w = imgElement.width;
        let h = imgElement.height;

        // حجم الصندوق المركزي الثابت
        let boxW = Math.floor(w * 0.45);
        let boxH = Math.floor(h * 0.55);

        // حجم الأطراف (الجدران المفرودة)
        let sideH = Math.floor(h * 0.3); 
        let sideW = Math.floor(w * 0.3);

        canvas.width = boxW + (sideW * 2);
        canvas.height = boxH + (sideH * 2);

        let bx1 = sideW;
        let by1 = sideH;

        // 1. رسم أرضية الهيكل الرمادي بالكامل كقطعة واحدة متصلة (مثل بلندر)
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#9e9e9e"; // لون الهيكل الرمادي الموحد
        
        // رسم الصليب المتصل
        ctx.fillRect(bx1, by1, boxW, boxH); // المركز
        ctx.fillRect(bx1, 0, boxW, sideH); // العلوي
        ctx.fillRect(bx1, by1 + boxH, boxW, sideH); // السفلي
        ctx.fillRect(0, by1, sideW, boxH); // الأيسر
        ctx.fillRect(bx1 + boxW, by1, sideW, boxH); // الأيمن

        // 2. تطبيق عزل الألوان للرسمة (Threshold)
        let tempCanvas = document.createElement('canvas');
        tempCanvas.width = w;
        tempCanvas.height = h;
        let tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(imgElement, 0, 0);

        let imgData = tempCtx.getImageData(0, 0, w, h);
        let data = imgData.data;
        let thresh = parseInt(thresholdSlider.value);

        for (let i = 0; i < data.length; i += 4) {
            let brightness = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
            let val = (brightness > thresh) ? 255 : 0;
            data[i] = val; data[i+1] = val; data[i+2] = val;
        }
        tempCtx.putImageData(imgData, 0, 0);

        let skewFactor = parseInt(skewSlider.value) / 100;

        // 3. رسم الأجزاء داخل جدران الهرم بشكل مشوه هندسياً ومنعزل
        function drawPerspectiveSide(srcX, srcY, srcW, srcH, targetX, targetY, targetW, targetH, rotation) {
            let sliceCanvas = document.createElement('canvas');
            sliceCanvas.width = srcW;
            sliceCanvas.height = srcH;
            let sliceCtx = sliceCanvas.getContext('2d');
            sliceCtx.drawImage(tempCanvas, srcX, srcY, srcW, srcH, 0, 0, srcW, srcH);

            ctx.save();
            
            // إنشاء قناع قطع (Clipping Mask) لضمان عدم خروج الرسمة عن حدود الجدار الرمادي
            ctx.beginPath();
            ctx.rect(targetX, targetY, targetW, targetH);
            ctx.clip();

            ctx.translate(targetX + targetW/2, targetY + targetH/2);
            ctx.rotate(rotation);
            ctx.translate(-targetW/2, -targetH/2);

            // الـ Deform التدريجي
            for (let y = 0; y < targetH; y++) {
                let progress = y / targetH;
                let scale = 1 + (progress * skewFactor);
                let sliceW = targetW * scale;
                let sliceX = (targetW - sliceW) / 2;

                ctx.drawImage(sliceCanvas, 0, Math.floor((y/targetH) * srcH), srcW, 1, sliceX, y, sliceW, 1);
            }
            ctx.restore();
        }

        // قص وتوزيع دقيق مطابق للـ Layout
        // الطرف العلوي (الرأس)
        drawPerspectiveSide(Math.floor(w*0.1), 0, Math.floor(w*0.8), sideH, bx1, 0, boxW, sideH, Math.PI);

        // الطرف السفلي (اليد السفلى)
        drawPerspectiveSide(Math.floor(w*0.1), h - sideH, Math.floor(w*0.8), sideH, bx1, by1 + boxH, boxW, sideH, 0);

        // الطرف الأيسر (الذراع الأيسر)
        drawPerspectiveSide(0, Math.floor(h*0.1), sideW, Math.floor(h*0.8), 0, by1, sideW, boxH, Math.PI / 2);

        // الطرف الأيمن (الذراع الأيمن)
        drawPerspectiveSide(w - sideW, Math.floor(h*0.1), sideW, Math.floor(h*0.8), bx1 + boxW, by1, sideW, boxH, -Math.PI / 2);

        // 4. مسح محتوى المربع المركزي (BOX) ليكون فارغاً تماماً مثل بلندر
        ctx.fillStyle = "#757575"; 
        ctx.fillRect(bx1, by1, boxW, boxH);

        downloadBtn.style.display = 'inline-block';
    }

    downloadBtn.addEventListener('click', () => {
        let link = document.createElement('a');
        link.download = 'perfect-shadow-box-layout.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
</script>

</body>
</html>
