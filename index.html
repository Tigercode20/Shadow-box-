<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 مولد إسقاط صناديق الظلال الهرمي</title>
    <style>
        :root {
            --primary-color: #0070f3;
            --bg-color: #f5f5f7;
            --panel-bg: #ffffff;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 900px;
            background: var(--panel-bg);
            margin: 0 auto;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .controls {
            background: #fafafa;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            border: 1px solid #eaeaea;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        input[type="range"] {
            width: 200px;
        }

        canvas {
            max-width: 100%;
            height: auto;
            border: 2px dashed #ccc;
            border-radius: 8px;
            margin-top: 20px;
            background: #fff;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            display: inline-block;
            text-decoration: none;
        }

        #loading {
            color: #ff3b30;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onOpenCvReady();"></script>
</head>
<body>

<div class="container">
    <h2>📐 مولد الظلال الهرمي العكسي (Pyramid Projection)</h2>
    <p>يقوم الكود بمط الأطراف لتصبح عمودية ورأسية عند فرد الصندوق، لتعطي ظلاً مستقيماً ومثالياً</p>
    
    <div id="loading">🔄 جاري تهيئة محرك الهندسة البصرية...</div>

    <div class="controls">
        <div>
            <label style="font-weight:600;">📁 ارفع الصورة: </label>
            <input type="file" id="fileInput" accept="image/*" disabled>
        </div>
        
        <div class="slider-group">
            <label for="thresholdSlider">🎚️ درجة العزل (Threshold): <span id="threshVal">115</span></label>
            <input type="range" id="thresholdSlider" min="0" max="255" value="115" disabled>
        </div>

        <div class="slider-group">
            <label for="slopeSlider">📐 زاوية ميل الأطراف (Perspective Flare): <span id="slopeVal">40%</span></label>
            <input type="range" id="slopeSlider" min="10" max="80" value="40" disabled>
        </div>
    </div>

    <div>
        <canvas id="canvasOutput"></canvas>
    </div>
    
    <button class="btn" id="downloadBtn" style="display:none;">💾 تحميل المخطط العمودي</button>
</div>

<script>
    let imgElement = new Image();
    let fileInput = document.getElementById('fileInput');
    let thresholdSlider = document.getElementById('thresholdSlider');
    let slopeSlider = document.getElementById('slopeSlider');
    let downloadBtn = document.getElementById('downloadBtn');

    function onOpenCvReady() {
        document.getElementById('loading').style.display = 'none';
        fileInput.disabled = false;
        thresholdSlider.disabled = false;
        slopeSlider.disabled = false;
    }

    fileInput.addEventListener('change', (e) => {
        if(e.target.files.length > 0) {
            let reader = new FileReader();
            reader.onload = (event) => { imgElement.src = event.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        }
    });

    imgElement.onload = () => { processShadowBox(); };
    thresholdSlider.addEventListener('input', () => {
        document.getElementById('threshVal').innerText = thresholdSlider.value;
        if(imgElement.src) processShadowBox();
    });
    slopeSlider.addEventListener('input', () => {
        document.getElementById('slopeVal').innerText = slopeSlider.value + "%";
        if(imgElement.src) processShadowBox();
    });

    function processShadowBox() {
        if (!cv.Mat) return;

        let src = cv.imread(imgElement);
        let gray = new cv.Mat();
        let binary = new cv.Mat();

        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
        cv.threshold(gray, binary, parseInt(thresholdSlider.value), 255, cv.THRESH_BINARY_INV);

        let h = binary.rows;
        let w = binary.cols;

        // الأبعاد الافتراضية للصندوق الداخلي (BOX)
        let boxW = Math.floor(w * 0.4);
        let boxH = Math.floor(h * 0.5);

        // نسبة الميل والمط المطلوبة للأطراف بناءً على السلايدر
        let flarePct = parseInt(slopeSlider.value) / 100;
        let flareW = Math.floor(boxW * flarePct);
        let flareH = Math.floor(boxH * flarePct);

        // إنشاء لوحة الرسم الكبيرة تتسع للشكل الهرمي بالكامل
        let canvasW = boxW + (boxH + flareH) * 2;
        let canvasH = boxH + (boxW + flareW) * 2;
        let canvasMat = new cv.Mat(canvasH, canvasW, cv.CV_8UC1, new cv.Scalar(255));

        // إحداثيات مركز الصندوق الداخلي الثابت (BOX)
        let bx1 = Math.floor((canvasW - boxW) / 2);
        let by1 = Math.floor((canvasH - boxH) / 2);
        let bx2 = bx1 + boxW;
        let by2 = by1 + boxH;

        // رسم المربع المركزي (أرضية الصندوق الثابتة)
        cv.rectangle(canvasMat, new cv.Point(bx1, by1), new cv.Point(bx2, by2), new cv.Scalar(230), -1);

        // دالة معالجة وعمل الـ Deform والـ Warp لكل طرف بشكل مستقل ليصبح عمودياً ورأسياً تماماً
        function warpSide(srcCrop, srcCoords, dstCoords, targetMat) {
            let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, srcCoords);
            let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, dstCoords);
            let M = cv.getPerspectiveTransform(srcTri, dstTri);
            
            let warped = new cv.Mat();
            cv.warpPerspective(srcCrop, warped, M, new cv.Size(canvasW, canvasH));
            
            // دمج الجزء المشوه فوق اللوحة الأساسية
            let mask = new cv.Mat();
            cv.threshold(warped, mask, 1, 255, cv.THRESH_BINARY);
            warped.copyTo(targetMat, mask);

            srcTri.delete(); dstTri.delete(); M.delete(); warped.delete(); mask.delete();
        }

        // 1. الطرف العلوي (Top) -> مط مائل لأعلى وللخارج
        let topCrop = binary.roi(new cv.Rect(0, 0, w, Math.floor(h * 0.4)));
        let tSrc = [0, 0,  w, 0,  0, topCrop.rows,  w, topCrop.rows];
        let tDst = [
            bx1 - flareW, by1 - boxH,       // أعلى يسار مائل ومطاطي
            bx2 + flareW, by1 - boxH,       // أعلى يمين مائل ومطاطي
            bx1, by1,                       // أسفل يسار ثابت على حافة الـ BOX
            bx2, by1                        // أسفل يمين ثابت على حافة الـ BOX
        ];
        warpSide(topCrop, tSrc, tDst, canvasMat);

        // 2. الطرف السفلي (Lower) -> مط مائل لأسفل وللخارج
        let botCrop = binary.roi(new cv.Rect(0, Math.floor(h * 0.6), w, Math.floor(h * 0.4)));
        let bSrc = [0, 0,  w, 0,  0, botCrop.rows,  w, botCrop.rows];
        let bDst = [
            bx1, by2,                       // أعلى يسار ثابت على حافة الـ BOX
            bx2, by2,                       // أعلى يمين ثابت على حافة الـ BOX
            bx1 - flareW, by2 + boxH,       // أسفل يسار مائل ومطاطي
            bx2 + flareW, by2 + boxH        // أسفل يمين مائل ومطاطي
        ];
        warpSide(botCrop, bSrc, bDst, canvasMat);

        // 3. الطرف الأيسر (Lift)
        let leftCrop = binary.roi(new cv.Rect(0, 0, Math.floor(w * 0.4), h));
        let lSrc = [0, 0,  leftCrop.cols, 0,  0, h,  leftCrop.cols, h];
        let lDst = [
            bx1 - boxW, by1 - flareH,       // أقصى أعلى يسار مائل ومطاطي
            bx1, by1,                       // أعلى يمين ثابت
            bx1 - boxW, by2 + flareH,       // أقصى أسفل يسار مائل ومطاطي
            bx1, by2                        // أسفل يمين ثابت
        ];
        warpSide(leftCrop, lSrc, lDst, canvasMat);

        // 4. الطرف الأيمن (Right)
        let rightCrop = binary.roi(new cv.Rect(Math.floor(w * 0.6), 0, Math.floor(w * 0.4), h));
        let rSrc = [0, 0,  rightCrop.cols, 0,  0, h,  rightCrop.cols, h];
        let rDst = [
            bx2, by1,                       // أعلى يسار ثابت
            bx2 + boxW, by1 - flareH,       // أقصى أعلى يمين مائل ومطاطي
            bx2, by2,                       // أسفل يسار ثابت
            bx2 + boxW, by2 + flareH        // أقصى أسفل يمين مائل ومطاطي
        ];
        warpSide(rightCrop, rSrc, rDst, canvasMat);

        // عرض النتيجة النهائية العمودية بالكامل
        cv.imshow('canvasOutput', canvasMat);
        downloadBtn.style.display = 'inline-block';

        // تنظيف الذاكرة
        src.delete(); gray.delete(); binary.delete();
        topCrop.delete(); botCrop.delete(); leftCrop.delete(); rightCrop.delete();
        canvasMat.delete();
    }

    downloadBtn.addEventListener('click', () => {
        let canvas = document.getElementById('canvasOutput');
        let link = document.createElement('a');
        link.download = 'perfect-shadow-box-pyramid.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
</script>

</body>
</html>
