  <head>

          if (typeof window.onOpenCvReady === 'function') {
            window.onOpenCvReady();
          }
        }
      };
    </script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
    
    <script type="module" src="/src/main.tsx"></script>
